[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Redireciona tudo para index.html (SPA com roteamento hash)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# HTTPS obrigatório
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-XSS-Protection       = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
